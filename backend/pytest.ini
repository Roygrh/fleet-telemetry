[pytest]
asyncio_mode = auto
# Force a single shared event loop for the entire test session for both
# test functions and async fixtures. Without session scope, pytest-asyncio
# 0.24 creates a new loop per test, causing "Future attached to a different
# loop" errors when asyncpg connections are reused across loop boundaries.
asyncio_default_fixture_loop_scope = session
testpaths = tests
